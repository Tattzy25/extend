<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Prompt Input</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
    }

    .prompt-container {
      background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.03),
        0 2px 4px rgba(0, 0, 0, 0.02),
        0 8px 16px rgba(0, 0, 0, 0.04),
        0 24px 48px rgba(0, 0, 0, 0.04);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .prompt-container:focus-within {
      box-shadow:
        0 0 0 2px rgba(99, 102, 241, 0.15),
        0 4px 8px rgba(99, 102, 241, 0.08),
        0 16px 32px rgba(99, 102, 241, 0.12),
        0 32px 64px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .prompt-textarea {
      background: transparent;
      resize: none;
      scrollbar-width: thin;
      scrollbar-color: #e2e8f0 transparent;
    }

    .prompt-textarea::-webkit-scrollbar {
      width: 4px;
    }

    .prompt-textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    .prompt-textarea::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 4px;
    }

    .prompt-textarea::placeholder {
      color: #94a3b8;
      transition: color 0.3s ease;
    }

    .prompt-textarea:focus::placeholder {
      color: #cbd5e1;
    }

    .submit-btn {
      background: linear-gradient(135deg, #1f2937 0%, #111827 50%, #000000 100%);
      background-size: 200% 200%;
      animation: gradient-shift 3s ease infinite;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 28px rgba(0, 0, 0, 0.4);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.9;
      cursor: not-allowed;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .action-btn {
      transition: all 0.2s ease;
    }

    .char-counter {
      transition: all 0.3s ease;
    }

    .char-warning {
      color: #f59e0b;
    }

    .char-danger {
      color: #ef4444;
    }

    .glow-ring {
      position: absolute;
      inset: -2px;
      border-radius: 28px;
      background: linear-gradient(135deg, #1f2937, #111827, #000000, #1f2937);
      background-size: 400% 400%;
      opacity: 0.25;
      z-index: -1;
      filter: blur(8px);
      transition: opacity 0.4s ease;
      animation: glow-rotate 4s linear infinite;
    }

    .prompt-container:focus-within .glow-ring {
      opacity: 0.4;
    }

    @keyframes glow-rotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .typing-indicator.active {
      opacity: 1;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #6366f1;
      border-radius: 50%;
      animation: typing-bounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .file-chip {
      animation: chip-in 0.3s ease forwards;
    }

    @keyframes chip-in {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-slate-50 via-indigo-50/30 to-purple-50/30 flex items-center justify-center p-6 overflow-auto">
  <div class="w-full max-w-2xl fade-in">
    <div class="prompt-container relative rounded-3xl p-1">
      <div class="glow-ring"></div>

      <div class="bg-white rounded-[22px] p-4">
        <div id="attachedFiles" class="hidden flex-wrap gap-2 mb-3 pb-3 border-b border-slate-100"></div>

        <input type="file" id="fileInput" class="hidden" accept="image/*" multiple />

        <div class="relative">
          <textarea
            id="promptInput"
            class="prompt-textarea w-full min-h-[120px] max-h-[300px] text-slate-700 text-[15px] leading-relaxed outline-none placeholder:font-light"
            placeholder="Describe your vision in detail..."
            maxlength="4000"
          ></textarea>

          <div id="typingIndicator" class="typing-indicator absolute bottom-2 left-0">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>

        <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-100">
          <div class="flex items-center gap-2">
            <button id="imageBtn" class="action-btn text-slate-500 hover:text-slate-700 transition-colors" title="Add image" type="button">
              <i data-lucide="image" class="w-6 h-6"></i>
            </button>

            <div class="w-px h-6 bg-slate-300 mx-1"></div>

            <button id="sparkleBtn" class="action-btn text-slate-500 hover:text-slate-700 transition-colors" title="Get inspiration" type="button">
              <i data-lucide="sparkles" class="w-6 h-6"></i>
            </button>
          </div>

          <div class="flex items-center gap-3">
            <span id="charCounter" class="char-counter text-xs text-slate-300 font-light tabular-nums">0 / 4000</span>

            <button
              id="submitBtn"
              class="submit-btn flex items-center gap-2 px-5 py-2.5 rounded-xl text-white text-sm font-medium shadow-lg shadow-indigo-500/25"
              disabled
              type="button"
            >
              <span id="submitBtnText">Generate</span>
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="generatedImagesContainer" class="mt-8 w-full hidden">
      <div id="generatedImages" class="grid grid-cols-2 gap-4 w-full"></div>
    </div>
  </div>

  <script>
    const promptInput = document.getElementById('promptInput');
    const charCounter = document.getElementById('charCounter');
    const submitBtn = document.getElementById('submitBtn');
    const imageBtn = document.getElementById('imageBtn');
    const sparkleBtn = document.getElementById('sparkleBtn');
    const fileInput = document.getElementById('fileInput');
    const attachedFilesContainer = document.getElementById('attachedFiles');
    const generatedImagesContainer = document.getElementById('generatedImagesContainer');
    const generatedImages = document.getElementById('generatedImages');
    const typingIndicator = document.getElementById('typingIndicator');

    const ideaPrompts = [
      "A futuristic cityscape at sunset with flying cars",
      "A serene mountain landscape with aurora borealis",
      "An underwater temple surrounded by bioluminescent creatures",
      "A cozy library filled with floating books and warm lighting",
      "A cyberpunk marketplace bustling with activity",
      "A peaceful forest with towering ancient trees",
      "A space station overlooking multiple planets",
      "A magical garden with glowing flora"
    ];

    lucide.createIcons();

    function generateUserId() {
      return 'user-' + Math.random().toString(36).slice(2, 11);
    }

    const currentUserId = generateUserId();

    function updateCharCounter() {
      const length = promptInput.value.length;
      const maxLength = 4000;
      charCounter.textContent = `${length.toLocaleString()} / ${maxLength.toLocaleString()}`;

      charCounter.classList.remove('char-warning', 'char-danger');
      if (length > maxLength * 0.9) {
        charCounter.classList.add('char-danger');
      } else if (length > maxLength * 0.75) {
        charCounter.classList.add('char-warning');
      }
    }

    function updateSubmitButton() {
      submitBtn.disabled = promptInput.value.trim().length === 0;
    }

    let typingTimeout;
    function updateTypingIndicator() {
      if (promptInput.value.length > 0) {
        typingIndicator.classList.add('active');
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          typingIndicator.classList.remove('active');
        }, 1000);
      } else {
        typingIndicator.classList.remove('active');
      }
    }

    promptInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 300) + 'px';
      updateCharCounter();
      updateSubmitButton();
      updateTypingIndicator();
    });

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && !submitBtn.disabled) {
        submitBtn.click();
      }
    });

    imageBtn.addEventListener('click', function () {
      fileInput.click();
    });

    fileInput.addEventListener('change', function (e) {
      const files = Array.from(e.target.files || []);
      attachedFilesContainer.innerHTML = '';

      if (files.length > 0) {
        attachedFilesContainer.classList.remove('hidden');
        attachedFilesContainer.classList.add('flex');

        files.forEach((file, index) => {
          const chip = document.createElement('div');
          chip.className = 'file-chip flex items-center gap-2 bg-indigo-50 text-indigo-700 px-3 py-2 rounded-lg text-xs font-medium';

          const fileName = file.name.length > 15 ? file.name.substring(0, 12) + '...' : file.name;

          chip.innerHTML = `
            <i data-lucide="file" class="w-4 h-4"></i>
            <span>${fileName}</span>
            <button class="ml-1 hover:text-indigo-900 transition-colors" data-file-index="${index}" type="button">
              <i data-lucide="x" class="w-3 h-3"></i>
            </button>
          `;

          chip.querySelector('button').addEventListener('click', function () {
            chip.remove();
            if (attachedFilesContainer.children.length === 0) {
              attachedFilesContainer.classList.add('hidden');
              attachedFilesContainer.classList.remove('flex');
            }
          });

          attachedFilesContainer.appendChild(chip);
        });

        lucide.createIcons();
      }

      fileInput.value = '';
    });

    sparkleBtn.addEventListener('click', function () {
      const randomIdea = ideaPrompts[Math.floor(Math.random() * ideaPrompts.length)];
      promptInput.value = randomIdea;
      promptInput.style.height = 'auto';
      promptInput.style.height = Math.min(promptInput.scrollHeight, 300) + 'px';
      updateCharCounter();
      updateSubmitButton();
      promptInput.focus();
    });

    function renderGeneratedImages(images) {
      generatedImages.innerHTML = '';

      images.slice(0, 4).forEach((imageUrl, index) => {
        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'relative overflow-hidden rounded-2xl bg-slate-100 aspect-square animate-fade-in';
        imageWrapper.style.animationDelay = `${index * 0.1}s`;

        const img = document.createElement('img');
        img.src = imageUrl;
        img.alt = `Generated image ${index + 1}`;
        img.className = 'w-full h-full object-cover hover:scale-105 transition-transform duration-300';
        img.loading = 'lazy';

        img.onerror = function () {
          this.parentElement.style.background = '#e5e7eb';
        };

        imageWrapper.appendChild(img);
        generatedImages.appendChild(imageWrapper);
      });

      generatedImagesContainer.classList.remove('hidden');
    }

    submitBtn.addEventListener('click', async function () {
      if (this.disabled) return;

      const prompt = promptInput.value.trim();
      if (!prompt) return;

      const originalBtnHtml = this.innerHTML;
      this.disabled = true;
      this.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Generating...</span>';
      lucide.createIcons();

      try {
        // NOTE: This file is a design reference only.
        // The actual app uses a server-side API route so no API keys live in the UI.
        throw new Error('Design-only HTML: generation is handled by the Next.js app, not this file.');

        promptInput.value = '';
        promptInput.style.height = 'auto';
        updateCharCounter();
        updateSubmitButton();
      } catch (error) {
        console.error('Generation error:', error);
        this.innerHTML = '<i data-lucide="alert-circle" class="w-4 h-4"></i><span>Try again</span>';
        lucide.createIcons();

        setTimeout(() => {
          this.innerHTML = originalBtnHtml;
          updateSubmitButton();
          lucide.createIcons();
        }, 2000);

        return;
      }

      this.innerHTML = originalBtnHtml;
      updateSubmitButton();
      lucide.createIcons();
    });

    updateCharCounter();
    updateSubmitButton();
  </script>
</body>
</html>
